name: Build Desktop Installers (macOS & Windows)

# Menghasilkan installer desktop via Tauri:
#   • macOS   → .dmg (universal: Apple Silicon + Intel) & .app
#   • Windows → .msi & setup .exe (NSIS)
# Jalan otomatis saat push tag v* (mis. v1.5.0) atau manual (Run workflow).
# Hasil diunggah sebagai Artifacts pada halaman run (dan Release bila dari tag).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# tauri-action perlu contents:write untuk membuat GitHub Release dari tag.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            target: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate app icons from logo
        run: npm run icons

      - name: Build installer (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
          # Bila dijalankan dari tag, buat GitHub Release berisi installer.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('POSMerahPutih {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      - name: Upload installers as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posmp-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
